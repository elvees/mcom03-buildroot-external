- project:
    check:
      jobs: &check-jobs
        - mcom03-linux66-buildroot-build:
            irrelevant-files:
              - .pre-commit-config.yaml$
              - configs/mcom03r
              - fragments/
              - README.rst$
        - mcom03r-linux66-buildroot-build:
            irrelevant-files:
              - .pre-commit-config.yaml$
              - configs/
              - regex: configs/mcom03r_defconfig$
                negate: true
              - fragments/
              - README.rst$
        - mcom03-cv-buildroot-build:
            files:
              - fragments/cv.fragment$
        - mcom03-linux66-nn-dev-buildroot-build:
            files:
              - fragments/nn-dev.fragment
        - mcom03r-linux66-qt-buildroot-build:
            files:
              - fragments/qt.fragment
        - mcom03r-linux66-qt6-buildroot-build:
            files:
              - fragments/qt6.fragment
        - mcom03-linux66-priv-buildroot-build:
            files:
              - .*-felix
              - .*-rogue-
              - .*-vpu-
              - configs/mcom03_defconfig$
              - fragments/private.fragment$
        - mcom03r-linux66-priv-buildroot-build:
            files:
              - .*-felix
              - .*-rogue-
              - .*-vpu-
              - configs/mcom03r_defconfig$
              - fragments/private.fragment$
        - mcom03r-fc-priv-buildroot-build:
            files:
              - .*mcom03r-fc
        - mcom03r-smarc-fc-buildroot-build:
            files:
              - configs/mcom03r_smarcr3-fc_defconfig$
        - pre-commit
        - mcom03-sbl-build:
            files:
              - board/elvees/mcom03-ddrinit-dtb-map.txt$
              - board/elvees/mcom03r-ddrinit-dtb-map.txt$
        - mcom03r-linux66-priv-coverage-buildroot-build:
            files: [.*gcov]
        - mcom03r-linux618-priv-buildroot-build:
            files:
              - .*-felix.*
              - .*-rogue-.*
              - .*-vpu-.*
              - configs/mcom03r_defconfig$
              - fragments/linux618.fragment$
              - fragments/private.fragment$
        - mcom03r-linux618-buildroot-build:
            irrelevant-files:
              - .pre-commit-config.yaml$
              - configs/.*|fragments.*
              - regex: configs/mcom03r_defconfig$
                negate: true
              - regex: fragments/(linux618|private).fragment$
                negate: true
              - package/mcom03-tl-
              - README.rst$
    gate:
      jobs: *check-jobs

    # Feel free to edit jobs below
    experimental:
      jobs:
        - mcom03r-fc-priv-buildroot-build
